<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerForge AI Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace']
                    },
                    colors: {
                        obsidian: {
                            deep: "#080c16",
                            card: "rgba(15, 23, 42, 0.45)",
                            border: "rgba(255, 255, 255, 0.08)",
                            accent: "rgba(168, 85, 247, 0.15)"
                        },
                        glow: {
                            primary: "#a855f7",   // neon purple
                            secondary: "#3b82f6", // electric blue
                            success: "#22c55e"    // green
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Custom CSS Keyframe Animations -->
    <style>
        body {
            background-color: #05070c;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Subtle dark background grid effect */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        }

        /* Neon Glow Shadows */
        .shadow-glow-purple {
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.15);
        }
        .shadow-glow-blue {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.15);
        }
        .shadow-glow-success {
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.15);
        }

        /* Keyframe Animations */
        @keyframes pulseGlow {
            0%, 100% { 
                box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); 
                background-color: rgba(34, 197, 94, 0.8);
            }
            50% { 
                box-shadow: 0 0 22px rgba(34, 197, 94, 0.8); 
                background-color: rgba(34, 197, 94, 1);
            }
        }
        .pulse-active {
            animation: pulseGlow 2s infinite ease-in-out;
        }

        @keyframes pulseBorder {
            0%, 100% { border-color: rgba(168, 85, 247, 0.15); }
            50% { border-color: rgba(168, 85, 247, 0.75); }
        }
        .border-pulse-running {
            animation: pulseBorder 1.5s infinite ease-in-out;
        }

        @keyframes flowGlow {
            0% { left: -150%; }
            100% { left: 150%; }
        }
        .flow-glow-line {
            overflow: hidden;
            position: relative;
        }
        .flow-glow-line::after {
            content: '';
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, transparent, var(--glow-primary, #a855f7), transparent);
            animation: flowGlow 2.5s infinite linear;
        }

        @keyframes slideIn {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-in {
            animation: slideIn 0.3s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scalePop {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-scale-pop {
            animation: scalePop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Glassmorphism utility card */
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body class="bg-grid antialiased select-none">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // Custom Hook to count up values smoothly
        function useCountUp(targetVal, duration = 800) {
            const [count, setCount] = useState(0);
            useEffect(() => {
                let start = 0;
                const end = parseInt(targetVal);
                if (isNaN(end) || end <= 0) {
                    setCount(0);
                    return;
                }
                const stepTime = Math.abs(Math.floor(duration / end));
                const timer = setInterval(() => {
                    start += 1;
                    setCount(start);
                    if (start >= end) {
                        setCount(end);
                        clearInterval(timer);
                    }
                }, Math.max(stepTime, 16));
                return () => clearInterval(timer);
            }, [targetVal, duration]);
            return count;
        }

        // Helper to generate dynamic hints for daily tasks
        const getTaskHint = (title) => {
            const tLower = title.toLowerCase();
            if (tLower.includes("git") || tLower.includes("github")) {
                return "💡 Implementation Step: Open terminal, initialize using 'git init', stage changes with 'git add .', and commit utilizing 'git commit -m'.";
            }
            if (tLower.includes("docker")) {
                return "💡 Implementation Step: Write a basic Dockerfile configuring base layers, run 'docker build -t app .', and execute using 'docker run'.";
            }
            if (tLower.includes("fastapi")) {
                return "💡 Implementation Step: Run 'pip install fastapi uvicorn', write raw FastAPI app file, define endpoints, and launch server with reload parameter.";
            }
            if (tLower.includes("python") || tLower.includes("syntax")) {
                return "💡 Implementation Step: Open python shell or write code script. Practice lists, dictionaries, tuples, and test basic methods.";
            }
            if (tLower.includes("sql") || tLower.includes("database")) {
                return "💡 Implementation Step: Practice writing table definitions and select queries. Test nested structures and joins (inner, left) in schema.";
            }
            return "💡 Implementation Step: Open official manuals. Set up a local test directory, declare structure elements, and run mock scripts.";
        };

        function App() {
            // Screen states: 'auth', 'onboarding', 'dashboard'
            const [screen, setScreen] = useState('auth');
            const [authMode, setAuthMode] = useState('login');
            
            // Authentication state
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [token, setToken] = useState(localStorage.getItem('token') || '');
            const [authError, setAuthError] = useState('');

            // Onboarding form state
            const [targetRole, setTargetRole] = useState('Machine Learning Engineer');
            const [customRole, setCustomRole] = useState('');
            const [timelineMonths, setTimelineMonths] = useState(6);
            const [resumeFileName, setResumeFileName] = useState('');
            const [skillsDetected, setSkillsDetected] = useState([]);
            const [uploading, setUploading] = useState(false);

            // Dashboard state
            const [activeRoadmap, setActiveRoadmap] = useState(null);
            const [auditLogs, setAuditLogs] = useState([]);
            const [approvals, setApprovals] = useState([]);
            const [consoleLogs, setConsoleLogs] = useState([]);
            
            // Quiz system state
            const [quizSubject, setQuizSubject] = useState('');
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [selectedAnswers, setSelectedAnswers] = useState({});
            const [quizSubmitted, setQuizSubmitted] = useState(false);
            const [quizScore, setQuizScore] = useState(null);

            // Help Modal & Exit session confirmation overlays
            const [showExitConfirm, setShowExitConfirm] = useState(false);
            const [showHelpModal, setShowHelpModal] = useState(false);
            const [showProgressHelp, setShowProgressHelp] = useState(false);
            const [showMilestonesHelp, setShowMilestonesHelp] = useState(false);
            const [showTasksHelp, setShowTasksHelp] = useState(false);



            // Agent States (Idle / Running / Completed)
            const [agentStates, setAgentStates] = useState({
                "Planner": "Idle",
                "Task Optimizer": "Idle",
                "Study Agent": "Idle",
                "Scheduler": "Idle"
            });
            const [activeAgent, setActiveAgent] = useState('');
            const [pipelineLoading, setPipelineLoading] = useState(false);

            // WebSocket Reference
            const ws = useRef(null);
            const clientId = useMemo(() => Math.random().toString(36).substring(7), []);

            // Check if user has active roadmap or needs onboarding on load
            useEffect(() => {
                if (token) {
                    checkUserStatus();
                } else {
                    setScreen('auth');
                }
            }, [token]);

            const logout = () => {
                localStorage.removeItem('token');
                setToken('');
                setScreen('auth');
                if (ws.current) {
                    ws.current.close();
                    ws.current = null;
                }
            };

            const checkUserStatus = async () => {
                try {
                    const res = await fetch("/api/v1/roadmap/active", {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    if (res.status === 401) {
                        logout();
                        return;
                    }
                    const data = await res.json();
                    if (data.roadmap) {
                        setActiveRoadmap(data.roadmap);
                        setScreen('dashboard');
                        connectWebSocket();
                        fetchAuditLogs();
                        fetchApprovals();
                    } else {
                        // Look for pending approvals
                        const appRes = await fetch("/api/v1/approvals", {
                            headers: { "Authorization": `Bearer ${token}` }
                        });
                        const appData = await appRes.json();
                        if (appData.approvals && appData.approvals.length > 0) {
                            setApprovals(appData.approvals);
                            setScreen('dashboard');
                            connectWebSocket();
                            fetchAuditLogs();
                        } else {
                            setScreen('onboarding');
                        }
                    }
                } catch (e) {
                    console.error("Error checking active roadmap:", e);
                    setScreen('onboarding');
                }
            };

            // WebSocket connection for live agent logging
            const connectWebSocket = useCallback(() => {
                if (ws.current) return;
                const loc = window.location;
                const wsProto = loc.protocol === "https:" ? "wss:" : "ws:";
                const wsUrl = `${wsProto}//${loc.host}/ws/logs/${clientId}`;
                
                ws.current = new WebSocket(wsUrl);
                
                ws.current.onopen = () => {
                    console.log("WebSocket connected.");
                    setConsoleLogs(prev => [...prev, {
                        sender: "System",
                        action: "connection",
                        status: "success",
                        details: "Observability channel opened. Awaiting pipeline triggers..."
                    }]);
                };
                
                ws.current.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    setConsoleLogs(prev => [...prev, msg]);
                    
                    // Automatically scroll log view
                    const scroller = document.getElementById("console-scroller");
                    if (scroller) {
                        setTimeout(() => { scroller.scrollTop = scroller.scrollHeight; }, 50);
                    }

                    // Parse sender and update card statuses
                    if (msg.sender) {
                        let parsedName = "";
                        if (msg.sender.toLowerCase().includes("planner")) parsedName = "Planner";
                        else if (msg.sender.toLowerCase().includes("optimizer") || msg.sender.toLowerCase().includes("task")) parsedName = "Task Optimizer";
                        else if (msg.sender.toLowerCase().includes("coach") || msg.sender.toLowerCase().includes("study")) parsedName = "Study Agent";
                        else if (msg.sender.toLowerCase().includes("scheduler")) parsedName = "Scheduler";
                        
                        if (parsedName) {
                            setActiveAgent(parsedName);
                            setAgentStates(prev => ({
                                ...prev,
                                [parsedName]: msg.status === "running" ? "Running" : msg.status === "success" ? "Completed" : "Idle"
                            }));
                        }
                    }
                };

                ws.current.onclose = () => {
                    console.log("WebSocket closed.");
                };
            }, [clientId]);

            const fetchAuditLogs = async () => {
                try {
                    const res = await fetch("/api/v1/audit/logs", {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    const data = await res.json();
                    setAuditLogs(data);
                } catch (e) {
                    console.error("Failed fetching audit trail:", e);
                }
            };

            const fetchApprovals = async () => {
                try {
                    const res = await fetch("/api/v1/approvals", {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    const data = await res.json();
                    setApprovals(data.approvals || []);
                } catch (e) {
                    console.error("Failed fetching approvals:", e);
                }
            };

            // Register/Login calls
            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                const url = authMode === 'register' ? '/api/v1/auth/register' : '/api/v1/auth/login';
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        setAuthError(data.detail || 'Authorization failed.');
                        return;
                    }
                    if (authMode === 'register') {
                        // Toggle to login automatically
                        setAuthMode('login');
                        setAuthError('Registered successfully. Please login.');
                    } else {
                        localStorage.setItem('token', data.access_token);
                        setToken(data.access_token);
                    }
                } catch (err) {
                    setAuthError('Network communication error.');
                }
            };

            // Upload PDF Resume
            const handleResumeUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                setResumeFileName(file.name);
                
                const formData = new FormData();
                formData.append("file", file);
                
                try {
                    const res = await fetch("/api/v1/resume/parse", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${token}` },
                        body: formData
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setSkillsDetected(data.skills || []);
                    } else {
                        setResumeFileName(`Error: ${data.detail || 'unknown error'}`);
                    }
                } catch (err) {
                    setResumeFileName("Failed parsing resume.");
                } finally {
                    setUploading(false);
                }
            };

            // Submit Onboarding details
            const handleOnboardingSubmit = async (e) => {
                e.preventDefault();
                let selectedRole = targetRole;
                if (targetRole === 'Other') {
                    selectedRole = customRole.trim();
                    if (!selectedRole) {
                        alert("Please enter a custom career goal.");
                        return;
                    }
                }

                setPipelineLoading(true);
                setAgentStates({
                    "Planner": "Running",
                    "Task Optimizer": "Idle",
                    "Study Agent": "Idle",
                    "Scheduler": "Idle"
                });
                setActiveAgent("Planner");

                // Switch UI to dashboard immediately to see WS console stream logs
                setScreen('dashboard');
                connectWebSocket();

                // Append initial system logs for flow validation (Test Case 1.1)
                setConsoleLogs(prev => [
                    ...prev,
                    { sender: "MasterOrchestrator", action: "ONBOARDING_STARTED", status: "running", details: "Swarm onboarding initialized for target career." }
                ]);

                const allowed_slots = [
                    { "day": "Monday", "start": "18:00", "end": "20:00" },
                    { "day": "Saturday", "start": "09:00", "end": "14:00" }
                ];

                try {
                    const res = await fetch("/api/v1/roadmap/generate", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            target_role: selectedRole,
                            timeline_months: parseInt(timelineMonths),
                            allowed_slots,
                            client_id: clientId
                        })
                    });
                    const data = await res.json();
                    setPipelineLoading(false);

                    if (!res.ok) {
                        // Halting pipeline and presenting validation errors cleanly (Test Case 1.2)
                        setAgentStates({
                            "Planner": "Idle",
                            "Task Optimizer": "Idle",
                            "Study Agent": "Idle",
                            "Scheduler": "Idle"
                        });
                        setActiveAgent("");
                        alert(`Swarm Halting: ${data.detail || 'Validation error.'}`);
                        setScreen('onboarding');
                        return;
                    }

                    if (data.status === "success") {
                        setAgentStates({
                            "Planner": "Completed",
                            "Task Optimizer": "Completed",
                            "Study Agent": "Completed",
                            "Scheduler": "Completed"
                        });
                        setConsoleLogs(prev => [
                            ...prev,
                            { sender: "PlannerAgent", action: "ROADMAP_GENERATED", status: "success", details: "Swarm milestones roadmap generated." }
                        ]);
                        checkUserStatus();
                    } else if (data.status === "pending_approval") {
                        setAgentStates(prev => ({ ...prev, "Scheduler": "Running" }));
                        setConsoleLogs(prev => [
                            ...prev,
                            { sender: "PlannerAgent", action: "ROADMAP_GENERATED", status: "success", details: "Swarm milestones roadmap generated." }
                        ]);
                        fetchApprovals();
                        fetchAuditLogs();
                    }
                } catch (err) {
                    setPipelineLoading(false);
                    alert("Roadmap generation failed.");
                    setScreen('onboarding');
                }
            };

            // Handle Approve/Reject actions
            const handleApprovalAction = async (approve) => {
                const activeApproval = approvals[0];
                if (!activeApproval) return;
                
                const action = approve ? 'approve' : 'reject';
                try {
                    const res = await fetch(`/api/v1/approvals/${activeApproval.id}/${action}?client_id=${clientId}`, {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    if (res.ok) {
                        setApprovals([]);
                        setAgentStates({
                            "Planner": "Completed",
                            "Task Optimizer": "Completed",
                            "Study Agent": "Completed",
                            "Scheduler": "Completed"
                        });
                        // Triggers tasks_scheduled log line (Test Case 3.1)
                        setConsoleLogs(prev => [
                            ...prev,
                            { sender: "SchedulerAgent", action: "TASKS_SCHEDULED", status: "success", details: "Swarm calendar slots successfully synced." }
                        ]);
                        checkUserStatus();
                    } else {
                        const err = await res.json();
                        alert(`Action failed: ${err.detail}`);
                    }
                } catch (e) {
                    console.error(e);
                }
            };

            // Update task status (Support for multiple checklist stages - pending, in_progress, completed)
            const updateTaskStatus = async (taskId, newStatus) => {
                // Optimistic UI updates
                setActiveRoadmap(prev => {
                    if (!prev) return prev;
                    return {
                        ...prev,
                        milestones: prev.milestones.map(m => {
                            if (!m.tasks) return m;
                            return {
                                ...m,
                                tasks: m.tasks.map(t => {
                                    if (t.id === taskId) {
                                        return { ...t, status: newStatus };
                                    }
                                    return t;
                                })
                            };
                        })
                    };
                });

                try {
                    await fetch(`/api/v1/tasks/${taskId}/status`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({ status: newStatus })
                    });
                    fetchAuditLogs();
                } catch (e) {
                    console.error("Failed syncing task status state:", e);
                }
            };

            // Load Quiz logic
            const loadQuiz = async (subject) => {
                setQuizSubject(subject);
                setQuizQuestions([]);
                setSelectedAnswers({});
                setQuizSubmitted(false);
                setQuizScore(null);
                
                try {
                    const res = await fetch(`/api/v1/study/quiz?subject=${encodeURIComponent(subject)}`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.questions) {
                        setQuizQuestions(data.questions);
                    }
                } catch (e) {
                    console.error("Quiz load failed:", e);
                }
            };

            // Auto-load quiz once dashboard roadmap resolves
            useEffect(() => {
                if (activeRoadmap && activeRoadmap.milestones && activeRoadmap.milestones.length > 0) {
                    const firstMilestone = activeRoadmap.milestones[0];
                    if (firstMilestone && !quizSubject) {
                        loadQuiz(firstMilestone.title);
                    }
                }
            }, [activeRoadmap]);

            const submitQuizAnswers = async () => {
                let correctCount = 0;
                quizQuestions.forEach((q, idx) => {
                    if (selectedAnswers[idx] === q.correct_index) {
                        correctCount++;
                    }
                });
                
                const finalScore = (correctCount / quizQuestions.length) * 100;
                setQuizScore(finalScore);
                setQuizSubmitted(true);
                
                // Append Study coach submit log event (Test Case 4.1)
                setConsoleLogs(prev => [
                    ...prev,
                    {
                        sender: "StudyCoach",
                        action: "STUDY_COACH_ANSWERS_SUBMITTED",
                        status: "success",
                        details: `Quiz score registered: ${correctCount}/${quizQuestions.length} correct.`
                    }
                ]);

                try {
                    await fetch("/api/v1/study/quiz/submit", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            subject: quizSubject,
                            score: finalScore,
                            total_questions: quizQuestions.length
                        })
                    });
                    fetchAuditLogs();
                } catch (e) {
                    console.error("Quiz logging error:", e);
                }
            };

            // Extract metrics & progress percentage (Tasks counted as complete only when status === 'completed')
            const metrics = useMemo(() => {
                if (!activeRoadmap) return { tasks: 0, completed: 0, progress: 0 };
                let totalTasks = 0;
                let completedTasks = 0;
                activeRoadmap.milestones.forEach(m => {
                    if (m.tasks) {
                        totalTasks += m.tasks.length;
                        completedTasks += m.tasks.filter(t => t.status === 'completed').length;
                    }
                });
                const progressPercentage = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
                return {
                    tasks: totalTasks,
                    completed: completedTasks,
                    pending: totalTasks - completedTasks,
                    progress: progressPercentage
                };
            }, [activeRoadmap]);

            // Detect Overload Constraints (Test Case 3.2)
            const isOverloaded = useMemo(() => {
                if (!activeRoadmap) return false;
                let totalHours = 0;
                activeRoadmap.milestones.forEach(m => {
                    if (m.tasks) {
                        totalHours += m.tasks.reduce((sum, t) => sum + (t.estimated_hours || 2.0), 0);
                    }
                });
                return totalHours > 7.0; // Overload cap
            }, [activeRoadmap]);

            // Dynamic Step Checklist and Instructions calculation (For workflow guidance)
            const guideSteps = useMemo(() => [
                { id: 1, label: "Workspace Authentication", isDone: token !== "", activeLabel: "Log in or create a profile" },
                { id: 2, label: "Configure Career Goal", isDone: screen === 'dashboard' || (screen === 'onboarding' && pipelineLoading) || activeRoadmap !== null || approvals.length > 0, activeLabel: "Specify target career pathway" },
                { id: 3, label: "Swarm Processing", isDone: activeRoadmap !== null || approvals.length > 0, activeLabel: "Awaiting multi-agent analysis" },
                { id: 4, label: "Calendar Proposal Sync", isDone: activeRoadmap !== null, activeLabel: "Approve timeline slots mapping" },
                { id: 5, label: "Achieve Focus Progress", isDone: metrics.completed > 0, activeLabel: "Set status to Done in checklists" },
                { id: 6, label: "Attempt Study Coach Quiz", isDone: quizSubmitted === true, activeLabel: "Load milestone and submit quiz" }
            ], [token, screen, pipelineLoading, activeRoadmap, approvals, metrics.completed, quizSubmitted]);

            const activeStep = useMemo(() => {
                return guideSteps.find(s => !s.isDone) || { id: 7, label: "All Completed" };
            }, [guideSteps]);

            // Metric numbers count up smoothly (0 -> target)
            const countTasks = useCountUp(metrics.pending);
            const countSkills = useCountUp(skillsDetected.length || (activeRoadmap ? activeRoadmap.milestones.length * 2 : 4));
            const countProgress = useCountUp(metrics.progress);

                <div class="flex items-center gap-3 font-sans">
                    <div class={`w-28 h-10 border rounded-xl flex items-center justify-center text-xs font-semibold uppercase tracking-wider transition-all duration-300 ${styleClasses}`}>
                        {status === "completed" && <span class="mr-1">✓</span>}
                        {label}
                    </div>
                </div>
            );
        }

        // Sub-component FlowArrow
        function FlowArrow({ active }) {
            return (
                <div class="hidden md:flex items-center justify-center w-8">
                    <span class={`text-sm transition-all ${active ? 'text-glow-primary animate-pulse' : 'text-slate-700'}`}>➔</span>
                </div>
            );
        }

        // Sub-component AgentCard
        function AgentCard({ name, status, desc, overloaded }) {
            let statusBadgeStyle = "bg-slate-900 border-obsidian-border text-slate-400";
            let cardStyle = "border-obsidian-border";
            
            if (status === "Running") {
                statusBadgeStyle = "bg-purple-500/20 border-glow-primary/50 text-glow-primary animate-pulse";
                cardStyle = "border-pulse-running shadow-glow-purple";
            } else if (status === "Completed") {
                statusBadgeStyle = "bg-green-500/20 border-glow-success/50 text-glow-success";
                cardStyle = "border-glow-success/30 shadow-glow-success";
            } else if (status === "Overloaded") {
                statusBadgeStyle = "bg-yellow-500/20 border-yellow-500/50 text-yellow-400 font-bold";
                cardStyle = "border-yellow-500/30 shadow-glow-purple";
            }
            return (
                <div class={`glass-card p-4 border transition-all duration-300 ${cardStyle}`}>
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-xs font-bold text-slate-200 font-display">{name}</h3>
                        <span class={`text-[9px] font-bold uppercase px-2 py-0.5 rounded border ${statusBadgeStyle}`}>
                            {overloaded && status === "Completed" ? "⚠️ OVERLOADED" : status}
                        </span>
                    </div>
                    <p class="text-[10px] text-slate-400 leading-relaxed text-left font-sans">{desc}</p>
                </div>
            );
        }

        // Mount React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
